name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node-test:
    name: node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ['22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Check JavaScript syntax
        run: npm run check:js

      - name: Run coverage gate
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage

      - name: Run tests
        run: npm test

  security-scan:
    name: security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem and config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.70.0
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: 'true'
          exit-code: '1'
          skip-dirs: generated
          timeout: 10m

      - name: Run Trivy pinned base image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          version: v0.70.0
          scan-type: image
          image-ref: node:22-bookworm-slim@sha256:7af03b14a13c8cdd38e45058fd957bf00a72bbe17feac43b1c15a689c029c732
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: 'true'
          exit-code: '1'
          timeout: 10m
