services:
  image-studio:
    build:
      context: .
    image: image-studio:local
    container_name: image-studio
    restart: unless-stopped

    ports:
      - "${HOST_PORT:-8787}:8787"

    environment:
      # 基础服务参数
      PORT: "8787"
      ADMIN_BOOTSTRAP_TOKEN: "${ADMIN_BOOTSTRAP_TOKEN:-}"

      # Node/V8 heap 上限。注意 Buffer、SQLite、native 内存不受该值完全约束。
      NODE_OPTIONS: "${NODE_OPTIONS:---max-old-space-size=512}"

      # 基础资源保护参数
      MAX_JSON_BODY_BYTES: "${MAX_JSON_BODY_BYTES:-1048576}"
      MAX_IMAGES_PER_REQUEST: "${MAX_IMAGES_PER_REQUEST:-1}"
      GLOBAL_CONCURRENT_GENERATIONS: "${GLOBAL_CONCURRENT_GENERATIONS:-4}"
      IMAGE_GENERATION_TIMEOUT_MS: "${IMAGE_GENERATION_TIMEOUT_MS:-600000}"
      IMAGE_DOWNLOAD_TIMEOUT_MS: "${IMAGE_DOWNLOAD_TIMEOUT_MS:-60000}"
      MAX_IMAGE_DOWNLOAD_BYTES: "${MAX_IMAGE_DOWNLOAD_BYTES:-26214400}"
      GENERATE_STREAM_HEARTBEAT_MS: "${GENERATE_STREAM_HEARTBEAT_MS:-15000}"
      SHUTDOWN_TIMEOUT_MS: "${SHUTDOWN_TIMEOUT_MS:-10000}"

      # 小团队默认额度；管理员可在“管理后台 → 额度管理”里覆盖。
      DEFAULT_DAILY_LIMIT: "${DEFAULT_DAILY_LIMIT:-10}"
      DEFAULT_MONTHLY_LIMIT: "${DEFAULT_MONTHLY_LIMIT:-200}"
      DEFAULT_STORAGE_LIMIT_MB: "${DEFAULT_STORAGE_LIMIT_MB:-500}"
      DEFAULT_CONCURRENT_LIMIT: "${DEFAULT_CONCURRENT_LIMIT:-1}"
      SIGNUP_IP_DAILY_LIMIT: "${SIGNUP_IP_DAILY_LIMIT:-20}"
      SIGNUP_IP_MONTHLY_LIMIT: "${SIGNUP_IP_MONTHLY_LIMIT:-400}"

      # 注册防刷：公开注册保留，但叠加 IP 限频；需要更强防护时把 REGISTRATION_MODE 改为 invite 并设置邀请码。
      REGISTRATION_MODE: "${REGISTRATION_MODE:-open}"
      REGISTRATION_INVITE_CODE: "${REGISTRATION_INVITE_CODE:-}"
      REGISTRATION_IP_MAX_PER_10MIN: "${REGISTRATION_IP_MAX_PER_10MIN:-3}"
      REGISTRATION_IP_MAX_PER_DAY: "${REGISTRATION_IP_MAX_PER_DAY:-5}"
      REGISTRATION_EMAIL_DOMAIN_ALLOWLIST: "${REGISTRATION_EMAIL_DOMAIN_ALLOWLIST:-}"
      REGISTRATION_EMAIL_DOMAIN_BLOCKLIST: "${REGISTRATION_EMAIL_DOMAIN_BLOCKLIST:-}"

      # 默认仅允许 HTTPS + 公网地址上游；隔离开发环境确需内网上游时再显式打开。
      ALLOW_INSECURE_UPSTREAMS: "${ALLOW_INSECURE_UPSTREAMS:-0}"
      ALLOW_PRIVATE_UPSTREAMS: "${ALLOW_PRIVATE_UPSTREAMS:-0}"
      TRUST_PROXY: "${TRUST_PROXY:-0}"

      # 只有在 HTTPS 反向代理后面部署时才建议设为 production，否则 Secure Cookie 会影响 HTTP 登录。
      NODE_ENV: "${NODE_ENV:-development}"

    volumes:
      # SQLite 数据库、WAL、生成图片都在这里；必须持久化。
      - image-studio-generated:/app/generated

    # Docker Compose 本地资源限制；Swarm/K8s 请换用对应平台的 resources 配置。
    mem_limit: "${CONTAINER_MEMORY_LIMIT:-768m}"
    cpus: "${CONTAINER_CPUS:-1.25}"
    pids_limit: 128

    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 15s

    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  image-studio-generated:
