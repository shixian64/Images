services:
  image-studio:
    build:
      context: .
    image: image-studio:local
    container_name: image-studio
    restart: unless-stopped

    ports:
      - "${HOST_PORT:-8787}:8787"

    environment:
      # 基础服务参数
      PORT: "8787"
      ADMIN_BOOTSTRAP_TOKEN: "${ADMIN_BOOTSTRAP_TOKEN:-}"
      ALLOW_FIRST_ADMIN_WITHOUT_TOKEN: "${ALLOW_FIRST_ADMIN_WITHOUT_TOKEN:-0}"
      IMAGE_STUDIO_SECRET_KEY: "${IMAGE_STUDIO_SECRET_KEY:-}"
      ALLOW_PLAINTEXT_SYSTEM_KEYS: "${ALLOW_PLAINTEXT_SYSTEM_KEYS:-0}"

      # Node/V8 heap 上限。注意 Buffer、SQLite、native 内存不受该值完全约束。
      NODE_OPTIONS: "${NODE_OPTIONS:---max-old-space-size=384}"

      # 基础资源保护参数
      MAX_JSON_BODY_BYTES: "${MAX_JSON_BODY_BYTES:-1048576}"
      MAX_MULTIPART_BODY_BYTES: "${MAX_MULTIPART_BODY_BYTES:-67108864}"
      MAX_UPSTREAM_RESPONSE_BYTES: "${MAX_UPSTREAM_RESPONSE_BYTES:-41943040}"
      MAX_IMAGES_PER_REQUEST: "${MAX_IMAGES_PER_REQUEST:-1}"
      IMAGE_GENERATION_BATCH_CONCURRENCY: "${IMAGE_GENERATION_BATCH_CONCURRENCY:-2}"
      GLOBAL_CONCURRENT_GENERATIONS: "${GLOBAL_CONCURRENT_GENERATIONS:-4}"
      IMAGE_GENERATION_TIMEOUT_MS: "${IMAGE_GENERATION_TIMEOUT_MS:-600000}"
      IMAGE_DOWNLOAD_TIMEOUT_MS: "${IMAGE_DOWNLOAD_TIMEOUT_MS:-60000}"
      MAX_IMAGE_DOWNLOAD_BYTES: "${MAX_IMAGE_DOWNLOAD_BYTES:-26214400}"
      MAX_REFERENCE_IMAGES: "${MAX_REFERENCE_IMAGES:-4}"
      MAX_REFERENCE_IMAGE_BYTES: "${MAX_REFERENCE_IMAGE_BYTES:-12582912}"
      MAX_REFERENCE_IMAGE_TOTAL_BYTES: "${MAX_REFERENCE_IMAGE_TOTAL_BYTES:-50331648}"
      REFERENCE_JOB_FILE_TTL_HOURS: "${REFERENCE_JOB_FILE_TTL_HOURS:-24}"
      GENERATE_STREAM_HEARTBEAT_MS: "${GENERATE_STREAM_HEARTBEAT_MS:-15000}"
      SHUTDOWN_TIMEOUT_MS: "${SHUTDOWN_TIMEOUT_MS:-10000}"
      RATE_LIMIT_MAX_KEYS: "${RATE_LIMIT_MAX_KEYS:-10000}"
      RATE_LIMIT_CLEANUP_INTERVAL_MS: "${RATE_LIMIT_CLEANUP_INTERVAL_MS:-60000}"
      GALLERY_STAT_CONCURRENCY: "${GALLERY_STAT_CONCURRENCY:-16}"
      GALLERY_MAINTENANCE_SCAN_PAGE_SIZE: "${GALLERY_MAINTENANCE_SCAN_PAGE_SIZE:-500}"
      GALLERY_ORPHAN_SCAN_MAX_DB_ROWS: "${GALLERY_ORPHAN_SCAN_MAX_DB_ROWS:-50000}"
      GALLERY_ORPHAN_SCAN_MAX_FILES: "${GALLERY_ORPHAN_SCAN_MAX_FILES:-20000}"
      GALLERY_ORPHAN_SCAN_MAX_DIRS: "${GALLERY_ORPHAN_SCAN_MAX_DIRS:-5000}"
      GALLERY_ORPHAN_SCAN_TIMEOUT_MS: "${GALLERY_ORPHAN_SCAN_TIMEOUT_MS:-15000}"
      SQLITE_BUSY_TIMEOUT_MS: "${SQLITE_BUSY_TIMEOUT_MS:-5000}"
      SQLITE_WAL_AUTOCHECKPOINT_PAGES: "${SQLITE_WAL_AUTOCHECKPOINT_PAGES:-1000}"
      DATA_CLEANUP_INTERVAL_MS: "${DATA_CLEANUP_INTERVAL_MS:-3600000}"
      AUDIT_LOG_RETENTION_DAYS: "${AUDIT_LOG_RETENTION_DAYS:-180}"
      CLIENT_LOG_RETENTION_DAYS: "${CLIENT_LOG_RETENTION_DAYS:-30}"
      USAGE_DAILY_RETENTION_DAYS: "${USAGE_DAILY_RETENTION_DAYS:-400}"
      LOGIN_IP_RATE_LIMIT_MAX_PER_MINUTE: "${LOGIN_IP_RATE_LIMIT_MAX_PER_MINUTE:-20}"
      LOGIN_ACCOUNT_RATE_LIMIT_MAX_PER_MINUTE: "${LOGIN_ACCOUNT_RATE_LIMIT_MAX_PER_MINUTE:-8}"
      LOGIN_PAIR_RATE_LIMIT_MAX_PER_MINUTE: "${LOGIN_PAIR_RATE_LIMIT_MAX_PER_MINUTE:-5}"
      CLIENT_LOG_RATE_LIMIT_MAX_PER_MINUTE: "${CLIENT_LOG_RATE_LIMIT_MAX_PER_MINUTE:-60}"
      CLIENT_LOG_RATE_LIMIT_WINDOW_MS: "${CLIENT_LOG_RATE_LIMIT_WINDOW_MS:-60000}"
      CHAT_RATE_LIMIT_MAX_PER_MINUTE: "${CHAT_RATE_LIMIT_MAX_PER_MINUTE:-20}"
      CHAT_GLOBAL_CONCURRENT_REQUESTS: "${CHAT_GLOBAL_CONCURRENT_REQUESTS:-4}"
      CHAT_MAX_MESSAGES: "${CHAT_MAX_MESSAGES:-12}"
      CHAT_MAX_INPUT_CHARS: "${CHAT_MAX_INPUT_CHARS:-12000}"
      CHAT_DEFAULT_MAX_COMPLETION_TOKENS: "${CHAT_DEFAULT_MAX_COMPLETION_TOKENS:-1200}"
      CHAT_MAX_COMPLETION_TOKENS: "${CHAT_MAX_COMPLETION_TOKENS:-6000}"
      CHAT_COMPLETION_TIMEOUT_MS: "${CHAT_COMPLETION_TIMEOUT_MS:-180000}"
      TEST_PROFILE_TIMEOUT_MS: "${TEST_PROFILE_TIMEOUT_MS:-30000}"

      # 小团队默认额度；生图与提示词优化共享次数，管理员可在“管理后台 → 额度管理”里覆盖。
      DEFAULT_DAILY_LIMIT: "${DEFAULT_DAILY_LIMIT:-10}"
      DEFAULT_MONTHLY_LIMIT: "${DEFAULT_MONTHLY_LIMIT:-200}"
      DEFAULT_STORAGE_LIMIT_MB: "${DEFAULT_STORAGE_LIMIT_MB:-500}"
      DEFAULT_CONCURRENT_LIMIT: "${DEFAULT_CONCURRENT_LIMIT:-1}"
      SIGNUP_IP_DAILY_LIMIT: "${SIGNUP_IP_DAILY_LIMIT:-20}"
      SIGNUP_IP_MONTHLY_LIMIT: "${SIGNUP_IP_MONTHLY_LIMIT:-400}"

      # 注册防刷：默认 closed；需要自助注册时改 invite 并设置 REGISTRATION_INVITE_CODE。
      REGISTRATION_MODE: "${REGISTRATION_MODE:-closed}"
      REGISTRATION_INVITE_CODE: "${REGISTRATION_INVITE_CODE:-}"
      REGISTRATION_IP_MAX_PER_10MIN: "${REGISTRATION_IP_MAX_PER_10MIN:-3}"
      REGISTRATION_IP_MAX_PER_DAY: "${REGISTRATION_IP_MAX_PER_DAY:-5}"
      REGISTRATION_EMAIL_DOMAIN_ALLOWLIST: "${REGISTRATION_EMAIL_DOMAIN_ALLOWLIST:-}"
      REGISTRATION_EMAIL_DOMAIN_BLOCKLIST: "${REGISTRATION_EMAIL_DOMAIN_BLOCKLIST:-}"

      # 默认仅允许 HTTPS + 公网地址上游；隔离开发环境确需内网上游时再显式打开。
      ALLOW_INSECURE_UPSTREAMS: "${ALLOW_INSECURE_UPSTREAMS:-0}"
      ALLOW_PRIVATE_UPSTREAMS: "${ALLOW_PRIVATE_UPSTREAMS:-0}"
      TRUST_PROXY: "${TRUST_PROXY:-0}"
      TRUST_PROXY_ALLOWED_IPS: "${TRUST_PROXY_ALLOWED_IPS:-127.0.0.1,::1}"

      # 默认支持 README 中的 http://localhost:8787 直连；放到 HTTPS 反代后再设为 production 以给 cookie 加 Secure。
      NODE_ENV: "${NODE_ENV:-development}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-0}"

    volumes:
      # SQLite 数据库、WAL、生成图片都在这里；必须持久化。
      - image-studio-generated:/app/generated

    # Docker Compose 本地资源限制；Swarm/K8s 请换用对应平台的 resources 配置。
    mem_limit: "${CONTAINER_MEMORY_LIMIT:-768m}"
    cpus: "${CONTAINER_CPUS:-1.25}"
    pids_limit: 128

    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 15s

    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  image-studio-generated:
